<section id="skills" class="pf-section skills">
  <div class="pf-container">
    <header class="pf-section-header">
      <p class="pf-eyebrow">Skills</p>
      <h2 class="pf-title">Technologies I work with.</h2>
      <p class="pf-subtitle">
        Icons are rendered from `public/icons/tech`, so the visual system stays consistent and easy
        to update.
      </p>
    </header>

    <div class="skills-grid">
      @for (skill of skills; track skill.name) {
        <article class="skill-orb" [style.--skill-color]="skill.accent">
          <div class="orb-icon">
            <img [src]="skill.icon" [alt]="skill.name" />
          </div>
          <h3>{{ skill.name }}</h3>
          <p>{{ skill.category }}</p>
        </article>
      }
    </div>
  </div>
</section>
